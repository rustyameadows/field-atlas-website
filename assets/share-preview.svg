<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Field Atlas share preview</title>
  <desc id="desc">A Field Atlas preview card with map-grid texture and launch copy.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7faf5"/>
      <stop offset="0.54" stop-color="#eef5f1"/>
      <stop offset="1" stop-color="#f9f5ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#23473a"/>
      <stop offset="0.55" stop-color="#d39a36"/>
      <stop offset="1" stop-color="#6c9eb4"/>
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#23473a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#17231d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M-80 520C130 390 260 420 430 300C610 172 730 168 936 92C1068 43 1162 42 1276 72" fill="none" stroke="#837868" stroke-opacity="0.12" stroke-width="12"/>
  <path d="M-120 600C120 474 245 505 425 382C604 260 752 244 965 158C1080 112 1168 112 1288 150" fill="none" stroke="#23473a" stroke-opacity="0.11" stroke-width="8"/>

  <g transform="translate(80 74)">
    <circle cx="34" cy="34" r="32" fill="#ffffff" stroke="#23473a" stroke-width="5"/>
    <path d="M18 45 31 18l7 22 14-9-14 22-7-22z" fill="#23473a"/>
    <circle cx="47" cy="18" r="5" fill="#d39a36"/>
    <text x="88" y="44" fill="#17231d" font-family="Arial" font-size="39" font-weight="800">Field Atlas</text>
  </g>

  <g transform="translate(80 188)">
    <text fill="#23473a" font-family="Arial" font-size="29" font-weight="800">Coming soon to iOS and iPadOS</text>
    <text y="92" fill="#17231d" font-family="Arial" font-size="86" font-weight="900">Explore places.</text>
    <text y="184" fill="#17231d" font-family="Arial" font-size="86" font-weight="900">Plan the drive.</text>
    <text y="254" fill="#4f5d54" font-family="Arial" font-size="34" font-weight="560">Outdoor trips, saved maps, and local-first planning</text>
    <text y="300" fill="#4f5d54" font-family="Arial" font-size="34" font-weight="560">for iPhone and iPad.</text>
  </g>

  <g transform="translate(810 178)" filter="url(#shadow)">
    <rect width="270" height="310" rx="18" fill="#ffffff" fill-opacity="0.82" stroke="#23473a" stroke-opacity="0.18"/>
    <rect x="34" y="50" width="202" height="6" rx="3" fill="url(#accent)"/>
    <text x="34" y="112" fill="#17231d" font-family="Arial" font-size="24" font-weight="850" letter-spacing="3">FIELD NOTE</text>
    <text x="34" y="166" fill="#4f5d54" font-family="Arial" font-size="25" font-weight="560">Outdoor places</text>
    <text x="34" y="208" fill="#4f5d54" font-family="Arial" font-size="25" font-weight="560">Saved maps</text>
    <text x="34" y="250" fill="#4f5d54" font-family="Arial" font-size="25" font-weight="560">Trip workspaces</text>
  </g>
</svg>
