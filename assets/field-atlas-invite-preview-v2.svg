<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Field Atlas trip invite preview</title>
  <desc id="desc">A Field Atlas trip invite preview card for opening a shared trip in the app.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7faf5"/>
      <stop offset="0.58" stop-color="#eef5f1"/>
      <stop offset="1" stop-color="#f8f3e8"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1">
      <stop offset="0" stop-color="#23473a"/>
      <stop offset="0.52" stop-color="#6c9eb4"/>
      <stop offset="1" stop-color="#d39a36"/>
    </linearGradient>
    <pattern id="grid" width="68" height="68" patternUnits="userSpaceOnUse">
      <path d="M68 0H0V68" fill="none" stroke="#23473a" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#17231d" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M-86 464C82 385 206 420 356 320C548 192 674 246 840 142C994 46 1104 78 1290 32" fill="none" stroke="#23473a" stroke-opacity="0.12" stroke-width="12"/>
  <path d="M-58 560C126 458 250 492 412 390C570 292 704 330 880 212C1000 132 1122 140 1280 86" fill="none" stroke="#837868" stroke-opacity="0.12" stroke-width="8"/>

  <g transform="translate(80 74)">
    <circle cx="34" cy="34" r="32" fill="#ffffff" stroke="#23473a" stroke-width="5"/>
    <path d="M18 45 31 18l7 22 14-9-14 22-7-22z" fill="#23473a"/>
    <circle cx="47" cy="18" r="5" fill="#d39a36"/>
    <text x="88" y="44" fill="#17231d" font-family="Arial" font-size="39" font-weight="800">Field Atlas</text>
  </g>

  <g transform="translate(80 190)">
    <text fill="#23473a" font-family="Arial" font-size="30" font-weight="800">Trip invite</text>
    <text y="98" fill="#17231d" font-family="Arial" font-size="86" font-weight="900">Open this trip</text>
    <text y="190" fill="#17231d" font-family="Arial" font-size="86" font-weight="900">in Field Atlas.</text>
    <text y="260" fill="#4f5d54" font-family="Arial" font-size="34" font-weight="560">Shared plans, stops, maps, and notes</text>
    <text y="306" fill="#4f5d54" font-family="Arial" font-size="34" font-weight="560">for iPhone and iPad.</text>
  </g>

  <g transform="translate(804 170)" filter="url(#shadow)">
    <rect width="280" height="324" rx="20" fill="#ffffff" fill-opacity="0.86" stroke="#23473a" stroke-opacity="0.18"/>
    <circle cx="80" cy="86" r="30" fill="#23473a"/>
    <circle cx="202" cy="230" r="30" fill="#d39a36"/>
    <path d="M104 106C150 134 168 178 184 208" fill="none" stroke="url(#route)" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 20"/>
    <rect x="48" y="46" width="64" height="80" rx="12" fill="#f7faf5" stroke="#23473a" stroke-opacity="0.24"/>
    <rect x="170" y="190" width="64" height="80" rx="12" fill="#f9f5ea" stroke="#23473a" stroke-opacity="0.24"/>
    <text x="48" y="164" fill="#17231d" font-family="Arial" font-size="24" font-weight="850">TRIP LINK</text>
    <text x="48" y="298" fill="#4f5d54" font-family="Arial" font-size="24" font-weight="560">Ready to open</text>
  </g>
</svg>
